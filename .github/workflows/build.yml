name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.157.0/hugo_extended_0.157.0_linux-amd64.tar.gz
          tar xzf hugo_extended_0.157.0_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/

      - name: Build
        run: hugo --minify

      - name: Check for broken internal links
        run: |
          grep -r 'href="/' public/ --include='*.html' -oh | \
            sed 's/href="//;s/"//' | sort -u | while read link; do
            path="public${link}"
            if [ "${link}" = "/" ]; then continue; fi
            if [ ! -f "${path}" ] && [ ! -f "${path}index.html" ] && [ ! -d "${path}" ]; then
              echo "BROKEN: ${link}"
              FOUND_BROKEN=1
            fi
          done
          if [ "${FOUND_BROKEN}" = "1" ]; then
            echo "::warning::Some internal links may be broken"
          fi
